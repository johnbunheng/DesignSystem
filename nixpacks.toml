[phases.setup]
nixPkgs = ["php82", "nodejs_22", "composer"]

[phases.build]
cmds = [
    "composer install --optimize-autoloader --no-dev",
    "npm install",
    "npm run build",
    "php artisan config:clear",
    "php artisan migrate --force"
]

[phases.start]
cmd = "php artisan serve --host 0.0.0.0 --port $PORT"